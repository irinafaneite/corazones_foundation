<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - Corazones of Courage</title>
    <link rel="stylesheet" href="../src/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
        href="https://fonts.googleapis.com/css2?family=Kanit:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
        rel="stylesheet" />
</head>
<body class="bg-primary min-h-screen flex items-center justify-center font-kanit">
    <div class="bg-white p-8 rounded-xl shadow-2xl w-full max-w-md mx-4">
        <div class="text-center mb-8">
            <img src="/logo-blanco.png" alt="Logo" class="w-16 h-16 mx-auto mb-4 invert object-contain">
            <h1 class="text-3xl font-extrabold text-primary">Admin Access</h1>
            <p class="text-gray-500 mt-2">Enter your credentials to manage events</p>
        </div>
        <form id="login-form" class="space-y-6">
            <div>
                <label for="email" class="block text-sm font-semibold text-primary/80">Email</label>
                <input type="email" id="email" required placeholder="admin@example.com"
                    class="mt-1 block w-full px-4 py-3 border border-gray-200 rounded-lg shadow-sm focus:ring-2 focus:ring-secondary focus:border-secondary outline-none transition-all bg-gray-50/50">
            </div>
            <div>
                <label for="password" class="block text-sm font-semibold text-primary/80">Password</label>
                <input type="password" id="password" required placeholder="••••••••"
                    class="mt-1 block w-full px-4 py-3 border border-gray-200 rounded-lg shadow-sm focus:ring-2 focus:ring-secondary focus:border-secondary outline-none transition-all bg-gray-50/50">
            </div>
            <div id="error-message" class="text-secondary text-sm hidden bg-red-50 p-3 rounded-lg border border-secondary/20 font-medium"></div>
            <button type="submit" id="submit-btn" class="w-full bg-secondary text-white font-bold py-3 rounded-lg shadow-lg hover:bg-primary transition-all transform hover:-translate-y-1 active:scale-95">
                Sign In
            </button>
        </form>
    </div>
    <script type="module" src="./login.js"></script>
</body>
</html>
