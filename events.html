<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Events - Corazones of Courage Foundation</title>
    <link rel="stylesheet" href="./src/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
        href="https://fonts.googleapis.com/css2?family=Kanit:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
        rel="stylesheet" />
</head>
<body class="font-kanit bg-gray-50">
    <!-- Mini Nav -->
    <nav class="bg-primary text-white py-4 px-6 fixed w-full top-0 z-50 shadow-md">
        <div class="container mx-auto flex justify-between items-center">
            <a href="/" class="flex items-center gap-2">
                <img src="/logo-blanco.png" alt="Logo" class="w-8 h-8 object-contain">
                <span class="font-bold tracking-tight">Corazones of Courage</span>
            </a>
            <div class="space-x-4 flex items-center">
                <a href="/" class="text-sm border-r border-white/20 pr-4 hover:text-other transition-colors">Home</a>
                <a href="/#contact" class="text-sm font-bold bg-secondary px-3 py-1 rounded hover:bg-white hover:text-secondary transition-all">Support Us</a>
            </div>
        </div>
    </nav>

    <header class="bg-primary pt-32 pb-20 px-4 text-center text-white">
        <h1 class="text-4xl lg:text-6xl font-extrabold mb-4">Our Events</h1>
        <p class="text-xl text-other max-w-2xl mx-auto">Join us in our upcoming activities, workshops, and fundraising events to support survivors of gender-based violence.</p>
    </header>

    <main class="container mx-auto px-4 py-16">
        <div id="events-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-10">
            <!-- Loading State -->
            <div id="loading-state" class="col-span-full text-center py-20">
                <div class="animate-pulse flex flex-col items-center">
                    <div class="w-16 h-16 bg-gray-200 rounded-full mb-4"></div>
                    <div class="h-4 bg-gray-200 w-48 rounded mb-2"></div>
                    <div class="h-3 bg-gray-200 w-32 rounded"></div>
                </div>
            </div>

            <!-- Empty State -->
            <div id="empty-state" class="col-span-full text-center py-20 hidden">
                <div class="flex flex-col items-center">
                    <div class="text-6xl mb-4">📅</div>
                    <h3 class="text-2xl font-bold text-primary mb-2">No upcoming events</h3>
                    <p class="text-gray-500">We are planning something special. Stay tuned!</p>
                </div>
            </div>
        </div>
    </main>

    <footer class="bg-primary text-white py-12 px-4 mt-auto">
        <div class="container mx-auto text-center">
            <img src="/logo-blanco.png" alt="Logo" class="w-12 mx-auto mb-4">
            <p class="text-sm opacity-60">© 2026 Corazones of Courage Foundation. All rights reserved.</p>
        </div>
    </footer>

    <script type="module" src="./src/js/public-events.js"></script>
</body>
</html>
